<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scores</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e11;
    --surface: #18181c;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.10);
    --text: #f0eff4;
    --muted: rgba(240,239,244,0.45);
    --accent: #c8f45a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(14,14,17,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0.85rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .event-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    padding: 5px 12px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
    display: inline-block;
  }
  .back-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
  .admin-badge {
    display: none;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 99px;
    background: rgba(200,244,90,0.12);
    border: 0.5px solid rgba(200,244,90,0.3);
    color: var(--accent);
  }

  main {
    padding: 6rem 1rem 2rem;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
  }

  .team-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    animation: slideIn 0.35s ease both;
    transition: border-color 0.3s;
  }
  .team-card:nth-child(1) { animation-delay: 0.05s; }
  .team-card:nth-child(2) { animation-delay: 0.10s; }
  .team-card:nth-child(3) { animation-delay: 0.15s; }
  .team-card:nth-child(4) { animation-delay: 0.20s; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .team-card.first  { border-color: rgba(255,215,0,0.45); }
  .team-card.second { border-color: rgba(192,192,192,0.35); }
  .team-card.third  { border-color: rgba(205,127,50,0.35); }

  .team-header {
    display: flex;
    align-items: center;
    padding: 1rem 1.25rem;
    gap: 1rem;
  }
  .rank { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
  .flag { font-size: 32px; flex-shrink: 0; }
  .team-name { font-size: 18px; font-weight: 600; flex: 1; }
  .total-score {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    min-width: 48px;
    text-align: right;
  }

  /* exercises section — only shown when at least one is active */
  .exercises {
    border-top: 0.5px solid var(--border);
    padding: 0.75rem 1.25rem 1rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .exercises.hidden { display: none; }

  .exercise-row {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.6rem 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .exercise-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .exercise-score-area { display: flex; align-items: center; gap: 6px; }
  .exercise-score { font-size: 18px; font-weight: 600; min-width: 28px; text-align: center; }

  .ex-btns { display: none; gap: 3px; }
  .ex-btn {
    background: rgba(255,255,255,0.06);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 14px;
    width: 26px; height: 26px;
    cursor: pointer;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .ex-btn:hover { background: rgba(255,255,255,0.12); }
  .ex-btn:active { transform: scale(0.9); }
  .ex-btn.minus { color: var(--muted); }

  /* admin-only: "add exercise" buttons shown before exercise is activated */
  .add-exercise-btn {
    background: rgba(255,255,255,0.03);
    border: 0.5px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 0.6rem 0.75rem;
    display: none;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .add-exercise-btn:hover { background: rgba(255,255,255,0.06); }
  .add-exercise-label { font-size: 12px; color: var(--muted); }
  .add-exercise-icon { font-size: 16px; color: var(--muted); }

  .status {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin: 1rem 0;
    min-height: 18px;
  }
  .reset-bar { text-align: center; margin-top: 0.5rem; display: none; }
  .reset-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    padding: 6px 16px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { color: #ff9f9f; border-color: rgba(255,107,107,0.4); }
  
  /* Team Members - Simple Design */
  .team-members {
    border-top: 0.5px solid var(--border);
    padding: 0.75rem 1.25rem 1rem;
  }
  .team-members-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }
  .team-members-title {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .team-members-actions {
    display: flex;
    gap: 6px;
  }
  .team-action-btn {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .team-action-btn:hover {
    background: rgba(200,244,90,0.15);
    border-color: var(--accent);
    color: var(--accent);
  }
  .team-action-btn.remove:hover {
    background: rgba(248,113,113,0.15);
    border-color: #f87171;
    color: #f87171;
  }
  .team-members-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .team-member-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: 99px;
    padding: 6px 12px 6px 6px;
  }
  .team-member-chip img {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    object-fit: cover;
  }
  .team-member-chip span {
    font-size: 13px;
  }
  .team-member-empty {
    font-size: 12px;
    color: var(--muted);
    padding: 8px 0;
  }
  
  /* Participant Picker Modal */
  .picker-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .picker-overlay.active { display: flex; }
  .picker-modal {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 320px;
    max-height: 70vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .picker-header {
    padding: 1rem;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .picker-title { font-size: 14px; font-weight: 600; }
  .picker-close {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }
  .picker-list {
    overflow-y: auto;
    padding: 0.5rem;
  }
  .picker-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
  }
  .picker-item:hover { background: var(--surface2); }
  .picker-item-photo {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    object-fit: cover;
  }
  .picker-item-name { font-size: 14px; }
  .picker-empty {
    padding: 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <div class="header-left" style="display:flex;align-items:center;gap:12px;">
    <a href="home.html" class="back-btn" style="text-decoration:none;">← Hjem</a>
    <div class="event-title">🏆 Scores</div>
  </div>
  <div class="header-right">
    <span class="admin-badge" id="admin-badge">Admin</span>
    <button class="back-btn" id="login-btn" onclick="doLogin()">🔒 Admin</button>
    <a href="wall.html" class="back-btn">🎤 The Wall</a>
  </div>
</header>

<main>
  <div id="scoreboard"></div>
  <div class="status" id="status">Loading...</div>
  <div class="reset-bar" id="reset-bar">
    <button class="reset-btn" onclick="resetAll()">Reset all scores</button>
  </div>
</main>

<script>
const SUPABASE_URL      = 'https://zbjngimdvoazcshkvbgv.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpiam5naW1kdm9hemNzaGt2Ymd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTgyOTAsImV4cCI6MjA5NzY5NDI5MH0.1M3PZYGqKqqLIsTkaPSH1gEloVhTXFGV_yYJaQdJ8YY'
const TABLE_NAME = 'scores'

const EXERCISES = ['Øvelse 1', 'Øvelse 2', 'Øvelse 3', 'Øvelse 4']

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// Teams loaded from database
let TEAMS = []

// scores[teamId] = [null, null, null, null]  — null = not yet activated
let scores = {}
let isAdmin = false

// Check if admin from session
const session = JSON.parse(localStorage.getItem('fp26_session') || 'null')
if (session && session.isAdmin) {
  isAdmin = true
}

function total(teamId) {
  return (scores[teamId] || []).reduce((a, b) => a + (b ?? 0), 0)
}

function rankEmoji(r) { return ['🥇','🥈','🥉','4'][r-1] ?? r }
function rankClass(r) { return ['first','second','third',''][r-1] ?? '' }

function getSortedTeams() {
  return [...TEAMS].sort((a, b) => total(b.id) - total(a.id))
}

function render() {
  const sorted = getSortedTeams()
  document.getElementById('scoreboard').innerHTML = sorted.map((team, i) => {
    const rank = i + 1
    const pts = scores[team.id] || [null, null, null, null]

    const anyActive = pts.some(p => p !== null)

    const exItems = EXERCISES.map((label, ei) => {
      const val = pts[ei]
      const isActive = val !== null

      if (isActive) {
        // Show the exercise row with score and (admin) +/- buttons
        return `
          <div class="exercise-row">
            <span class="exercise-label">${label}</span>
            <div class="exercise-score-area">
              <div class="exercise-score">${val}</div>
              <div class="ex-btns" id="exbtns-${team.id}-${ei}">
                <button class="ex-btn plus"  onclick="changeScore('${team.id}', ${ei}, 1)">+</button>
                <button class="ex-btn minus" onclick="changeScore('${team.id}', ${ei}, -1)">−</button>
              </div>
            </div>
          </div>`
      } else {
        // Admin only: dashed "add" button to activate this exercise
        return `
          <div class="add-exercise-btn" id="addbtn-${team.id}-${ei}" onclick="activateExercise('${team.id}', ${ei})">
            <span class="add-exercise-label">${label}</span>
            <span class="add-exercise-icon">+</span>
          </div>`
      }
    }).join('')

    return `
      <div class="team-card ${rankClass(rank)}">
        <div class="team-header">
          <div class="rank">${rankEmoji(rank)}</div>
          <div class="flag">${team.flag}</div>
          <div class="team-name">${team.name}</div>
          <div class="total-score">${total(team.id)}</div>
        </div>
        <div class="team-members" id="members-${team.id}">
          <div class="team-members-header">
            <span class="team-members-title">Lagmedlemmer</span>
            ${isAdmin ? `
              <div class="team-members-actions">
                <button class="team-action-btn" onclick="openAddPicker(${team.id})" title="Legg til">+</button>
                <button class="team-action-btn remove" onclick="openRemovePicker(${team.id})" title="Fjern">−</button>
              </div>
            ` : ''}
          </div>
          <div class="team-members-list" id="members-list-${team.id}">
            <span class="team-member-empty">Laster...</span>
          </div>
        </div>
        <div class="exercises ${anyActive || isAdmin ? '' : 'hidden'}" id="exercises-${team.id}">
          ${exItems}
        </div>
      </div>`
  }).join('')

  applyAdminUI()
  
  // Load members for each team
  TEAMS.forEach(team => loadTeamMembers(team.id))
}

function applyAdminUI() {
  // Show +/- buttons on active exercises
  document.querySelectorAll('[id^="exbtns-"]').forEach(el => {
    el.style.display = isAdmin ? 'flex' : 'none'
  })
  // Show dashed "add" buttons for inactive exercises (admin only)
  document.querySelectorAll('[id^="addbtn-"]').forEach(el => {
    el.style.display = isAdmin ? 'flex' : 'none'
  })
  // Show exercises section even if nothing active yet (so admin sees add buttons)
  if (isAdmin) {
    document.querySelectorAll('.exercises').forEach(el => el.classList.remove('hidden'))
  }
  document.getElementById('reset-bar').style.display = isAdmin ? 'block' : 'none'
  document.getElementById('admin-badge').style.display = isAdmin ? 'inline-block' : 'none'
  document.getElementById('login-btn').style.display = isAdmin ? 'none' : 'inline-block'
}

function doLogin() {
  // Redirect to login page to log in as admin
  localStorage.removeItem('fp26_session')
  window.location.href = 'index.html'
}

function checkAdmin() {
  if (isAdmin) return true
  return false
}

async function activateExercise(teamId, ei) {
  if (!checkAdmin()) return
  scores[teamId][ei] = 0
  render()
  await save(teamId)
}

async function changeScore(teamId, ei, delta) {
  if (!checkAdmin()) return
  const pts = scores[teamId]
  pts[ei] = Math.max(0, (pts[ei] ?? 0) + delta)
  render()
  await save(teamId)
}

async function save(teamId) {
  setStatus('Saving...')
  const { error } = await sb.from(TABLE_NAME).upsert(
    { team_id: teamId, scores: scores[teamId] },
    { onConflict: 'team_id' }
  )
  setStatus(error ? '⚠️ Could not save' : 'Saved ✓')
  setTimeout(() => setStatus(''), 1500)
}

async function resetAll() {
  if (!checkAdmin()) return
  if (!confirm('Reset all scores to 0?')) return
  TEAMS.forEach(t => { scores[t.id] = [null, null, null, null] })
  render()
  setStatus('Resetting...')
  const updates = TEAMS.map(t => ({ team_id: t.id, scores: [null, null, null, null] }))
  const { error } = await sb.from(TABLE_NAME).upsert(updates, { onConflict: 'team_id' })
  setStatus(error ? '⚠️ Could not save' : 'Reset done ✓')
  setTimeout(() => setStatus(''), 1500)
}

function setStatus(msg) { document.getElementById('status').textContent = msg }

async function loadTeams() {
  const { data, error } = await sb.from('teams').select('*').order('id')
  if (error) { setStatus('⚠️ Could not load teams'); return }
  TEAMS = data.map(t => ({ id: t.id, name: t.team_name, flag: t.flag || '🏳️' }))
  TEAMS.forEach(t => { scores[t.id] = [null, null, null, null] })
}

// Load and display members for a specific team (direct query)
async function loadTeamMembers(teamId) {
  const container = document.getElementById(`members-list-${teamId}`)
  if (!container) return
  
  const { data, error } = await sb
    .from('participants')
    .select('id, participant, photo_url')
    .eq('team_id', teamId)
    .order('participant')
  
  if (error) {
    container.innerHTML = '<span class="team-member-empty">Feil ved lasting</span>'
    console.error('Error loading team members:', error)
    return
  }
  
  if (!data || data.length === 0) {
    container.innerHTML = '<span class="team-member-empty">Ingen medlemmer</span>'
    return
  }
  
  container.innerHTML = data.map(p => `
    <div class="team-member-chip">
      <img src="${p.photo_url || 'placeholder.png'}" onerror="this.src='placeholder.png'">
      <span>${p.participant}</span>
    </div>
  `).join('')
}

// Load unassigned participants for picker
async function loadUnassignedParticipants() {
  const { data, error } = await sb
    .from('participants')
    .select('id, participant, photo_url')
    .is('team_id', null)
    .order('participant')
  
  if (error) {
    console.error('Error loading unassigned:', error)
    return []
  }
  return data || []
}

// Load team members for remove picker
async function loadTeamMembersForRemove(teamId) {
  const { data, error } = await sb
    .from('participants')
    .select('id, participant, photo_url')
    .eq('team_id', teamId)
    .order('participant')
  
  if (error) {
    console.error('Error loading team members:', error)
    return []
  }
  return data || []
}

// Picker state
let pickerTeamId = null
let pickerMode = 'add' // 'add' or 'remove'

function openAddPicker(teamId) {
  if (!isAdmin) return
  pickerTeamId = teamId
  pickerMode = 'add'
  document.getElementById('picker-title').textContent = 'Legg til deltaker'
  renderAddPicker()
  document.getElementById('picker-overlay').classList.add('active')
}

function openRemovePicker(teamId) {
  if (!isAdmin) return
  pickerTeamId = teamId
  pickerMode = 'remove'
  document.getElementById('picker-title').textContent = 'Fjern deltaker'
  renderRemovePicker()
  document.getElementById('picker-overlay').classList.add('active')
}

function closePicker() {
  document.getElementById('picker-overlay').classList.remove('active')
  pickerTeamId = null
}

async function renderAddPicker() {
  const list = document.getElementById('picker-list')
  list.innerHTML = '<div class="picker-empty">Laster...</div>'
  
  const unassigned = await loadUnassignedParticipants()
  
  if (unassigned.length === 0) {
    list.innerHTML = '<div class="picker-empty">Ingen ledige deltakere</div>'
    return
  }
  
  list.innerHTML = unassigned.map(p => `
    <div class="picker-item" onclick="addToTeam(${p.id})">
      <img src="${p.photo_url || 'placeholder.png'}" class="picker-item-photo" onerror="this.src='placeholder.png'">
      <span class="picker-item-name">${p.participant}</span>
    </div>
  `).join('')
}

async function renderRemovePicker() {
  const list = document.getElementById('picker-list')
  list.innerHTML = '<div class="picker-empty">Laster...</div>'
  
  const members = await loadTeamMembersForRemove(pickerTeamId)
  
  if (members.length === 0) {
    list.innerHTML = '<div class="picker-empty">Ingen medlemmer å fjerne</div>'
    return
  }
  
  list.innerHTML = members.map(p => `
    <div class="picker-item" onclick="removeFromTeam(${p.id})" style="border-left: 3px solid #f87171;">
      <img src="${p.photo_url || 'placeholder.png'}" class="picker-item-photo" onerror="this.src='placeholder.png'">
      <span class="picker-item-name">${p.participant}</span>
    </div>
  `).join('')
}

async function addToTeam(participantId) {
  if (!pickerTeamId) return
  
  closePicker()
  setStatus('Legger til...')
  
  const { error } = await sb
    .from('participants')
    .update({ team_id: pickerTeamId })
    .eq('id', participantId)
  
  if (error) {
    console.error('Add error:', error)
    setStatus('⚠️ Kunne ikke lagre')
    return
  }
  
  // Refresh this team's members
  await loadTeamMembers(pickerTeamId)
  setStatus('Lagt til ✓')
  setTimeout(() => setStatus(''), 1500)
}

async function removeFromTeam(participantId) {
  closePicker()
  setStatus('Fjerner...')
  
  const teamId = pickerTeamId
  
  const { error } = await sb
    .from('participants')
    .update({ team_id: null })
    .eq('id', participantId)
  
  if (error) {
    console.error('Remove error:', error)
    setStatus('⚠️ Kunne ikke lagre')
    return
  }
  
  // Refresh this team's members
  await loadTeamMembers(teamId)
  setStatus('Fjernet ✓')
  setTimeout(() => setStatus(''), 1500)
}

async function loadScores() {
  const { data, error } = await sb.from(TABLE_NAME).select('team_id, scores')
  if (error) { setStatus('⚠️ Could not load scores'); return }
  data.forEach(row => { if (row.scores) scores[row.team_id] = row.scores })
  render()
  setStatus('')
}

function subscribeRealtime() {
  sb.channel('scores')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE_NAME }, payload => {
      const row = payload.new
      if (row?.team_id) {
        scores[row.team_id] = row.scores || [null, null, null, null]
        render()
      }
    })
    .subscribe()
}

async function init() {
  await loadTeams()
  await loadScores()
  subscribeRealtime()
}
