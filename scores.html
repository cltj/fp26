<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scores</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e11;
    --surface: #18181c;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.10);
    --text: #f0eff4;
    --muted: rgba(240,239,244,0.45);
    --accent: #c8f45a;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
  }

  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(14,14,17,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0.85rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .event-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .back-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    padding: 5px 12px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.15s, color 0.15s;
    display: inline-block;
  }
  .back-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
  .admin-badge {
    display: none;
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 99px;
    background: rgba(200,244,90,0.12);
    border: 0.5px solid rgba(200,244,90,0.3);
    color: var(--accent);
  }

  main {
    padding: 6rem 1rem 2rem;
    max-width: 640px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── Team card ── */
  .team-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    animation: slideIn 0.35s ease both;
    transition: border-color 0.3s;
  }
  .team-card:nth-child(1) { animation-delay: 0.05s; }
  .team-card:nth-child(2) { animation-delay: 0.10s; }
  .team-card:nth-child(3) { animation-delay: 0.15s; }
  .team-card:nth-child(4) { animation-delay: 0.20s; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .team-card.first  { border-color: rgba(255,215,0,0.45); }
  .team-card.second { border-color: rgba(192,192,192,0.35); }
  .team-card.third  { border-color: rgba(205,127,50,0.35); }

  /* Team header row */
  .team-header {
    display: flex;
    align-items: center;
    padding: 1rem 1.25rem;
    gap: 1rem;
  }
  .rank { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
  .flag { font-size: 32px; flex-shrink: 0; }
  .team-name { font-size: 18px; font-weight: 600; flex: 1; }
  .total-score {
    font-size: 32px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    min-width: 48px;
    text-align: right;
  }

  /* Exercises */
  .exercises {
    border-top: 0.5px solid var(--border);
    padding: 0.75rem 1.25rem 1rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .exercise-row {
    background: var(--surface2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.6rem 0.75rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .exercise-label {
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
  }
  .exercise-score-area {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .exercise-score {
    font-size: 18px;
    font-weight: 600;
    min-width: 28px;
    text-align: center;
    color: var(--text);
  }
  .ex-btns {
    display: none;
    gap: 3px;
  }
  .ex-btn {
    background: rgba(255,255,255,0.06);
    border: 0.5px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 14px;
    width: 26px;
    height: 26px;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .ex-btn:hover { background: rgba(255,255,255,0.12); }
  .ex-btn:active { transform: scale(0.9); }
  .ex-btn.minus { color: var(--muted); }

  .status {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin: 1rem 0;
    min-height: 18px;
  }

  .reset-bar { text-align: center; margin-top: 0.5rem; display: none; }
  .reset-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    padding: 6px 16px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:hover { color: #ff9f9f; border-color: rgba(255,107,107,0.4); }
</style>
</head>
<body>

<header>
  <div class="event-title">🏆 Scores</div>
  <div class="header-right">
    <span class="admin-badge" id="admin-badge">Admin</span>
    <a href="wall.html" class="back-btn">← The Wall</a>
  </div>
</header>

<main>
  <div id="scoreboard"></div>
  <div class="status" id="status">Loading...</div>
  <div class="reset-bar" id="reset-bar">
    <button class="reset-btn" onclick="resetAll()">Reset all scores</button>
  </div>
</main>

<script>
const SUPABASE_URL      = 'https://zbjngimdvoazcshkvbgv.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpiam5naW1kdm9hemNzaGt2Ymd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTgyOTAsImV4cCI6MjA5NzY5NDI5MH0.1M3PZYGqKqqLIsTkaPSH1gEloVhTXFGV_yYJaQdJ8YY'
const TABLE_NAME        = 'scores'

const TEAMS = [
  { id: 'norge',     name: 'Norge',     flag: '🇳🇴' },
  { id: 'frankrike', name: 'Frankrike', flag: '🇫🇷' },
  { id: 'senegal',   name: 'Senegal',   flag: '🇸🇳' },
  { id: 'irak',      name: 'Irak',      flag: '🇮🇶' },
]

const EXERCISES = ['Øvelse 1', 'Øvelse 2', 'Øvelse 3', 'Øvelse 4']

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// scores[teamId][exerciseIndex] = points
let scores = {}
let isAdmin = false

TEAMS.forEach(t => { scores[t.id] = [0, 0, 0, 0] })

function total(teamId) {
  return (scores[teamId] || [0,0,0,0]).reduce((a, b) => a + b, 0)
}

function rankEmoji(rank) {
  return ['🥇','🥈','🥉','4'][rank - 1] ?? rank
}
function rankClass(rank) {
  return ['first','second','third',''][rank - 1] ?? ''
}

function getSortedTeams() {
  return [...TEAMS].sort((a, b) => total(b.id) - total(a.id))
}

function render() {
  const sorted = getSortedTeams()
  document.getElementById('scoreboard').innerHTML = sorted.map((team, i) => {
    const rank = i + 1
    const pts = scores[team.id] || [0,0,0,0]
    const exRows = EXERCISES.map((label, ei) => `
      <div class="exercise-row">
        <span class="exercise-label">${label}</span>
        <div class="exercise-score-area">
          <div class="exercise-score" id="ex-${team.id}-${ei}">${pts[ei]}</div>
          <div class="ex-btns" id="exbtns-${team.id}-${ei}">
            <button class="ex-btn plus" onclick="changeScore('${team.id}', ${ei}, 1)">+</button>
            <button class="ex-btn minus" onclick="changeScore('${team.id}', ${ei}, -1)">−</button>
          </div>
        </div>
      </div>
    `).join('')

    return `
      <div class="team-card ${rankClass(rank)}">
        <div class="team-header">
          <div class="rank">${rankEmoji(rank)}</div>
          <div class="flag">${team.flag}</div>
          <div class="team-name">${team.name}</div>
          <div class="total-score" id="total-${team.id}">${total(team.id)}</div>
        </div>
        <div class="exercises">${exRows}</div>
      </div>
    `
  }).join('')

  applyAdminUI()
}

function applyAdminUI() {
  document.querySelectorAll('[id^="exbtns-"]').forEach(el => {
    el.style.display = isAdmin ? 'flex' : 'none'
  })
  document.getElementById('reset-bar').style.display = isAdmin ? 'block' : 'none'
  document.getElementById('admin-badge').style.display = isAdmin ? 'inline-block' : 'none'
}

function checkAdmin() {
  if (isAdmin) return true
  const pw = prompt('Admin-passord:')
  if (pw === '9900') {
    isAdmin = true
    applyAdminUI()
    return true
  }
  return false
}

async function changeScore(teamId, exerciseIndex, delta) {
  if (!checkAdmin()) return
  const pts = scores[teamId] || [0,0,0,0]
  pts[exerciseIndex] = Math.max(0, pts[exerciseIndex] + delta)
  scores[teamId] = pts
  render()
  setStatus('Saving...')
  const { error } = await sb.from(TABLE_NAME).upsert(
    { team_id: teamId, scores: pts },
    { onConflict: 'team_id' }
  )
  setStatus(error ? '⚠️ Could not save' : 'Saved ✓')
  setTimeout(() => setStatus(''), 1500)
}

async function resetAll() {
  if (!checkAdmin()) return
  if (!confirm('Reset all scores to 0?')) return
  TEAMS.forEach(t => { scores[t.id] = [0,0,0,0] })
  render()
  setStatus('Resetting...')
  const updates = TEAMS.map(t => ({ team_id: t.id, scores: [0,0,0,0] }))
  const { error } = await sb.from(TABLE_NAME).upsert(updates, { onConflict: 'team_id' })
  setStatus(error ? '⚠️ Could not save' : 'Reset done ✓')
  setTimeout(() => setStatus(''), 1500)
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg
}

async function loadScores() {
  const { data, error } = await sb.from(TABLE_NAME).select('team_id, scores')
  if (error) { setStatus('⚠️ Could not load scores'); return }
  data.forEach(row => {
    if (row.scores) scores[row.team_id] = row.scores
  })
  render()
  setStatus('')
}

function subscribeRealtime() {
  sb.channel('scores')
    .on('postgres_changes', { event: '*', schema: 'public', table: TABLE_NAME }, payload => {
      const row = payload.new
      if (row?.team_id && row?.scores) {
        scores[row.team_id] = row.scores
        render()
      }
    })
    .subscribe()
}

loadScores()
subscribeRealtime()
</script>
</body>
</html>
