<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP26 – Hjem</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e11;
    --surface: #18181c;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.10);
    --text: #f0eff4;
    --muted: rgba(240,239,244,0.45);
    --accent: #c8f45a;
    --accent-dark: #a8d038;
    --accent-music: #fa57c1;
    --accent-submit: #60c8ff;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    padding-bottom: 2rem;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(14,14,17,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0.85rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .event-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .user-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(200,244,90,0.12);
    border: 0.5px solid rgba(200,244,90,0.3);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
  }
  .admin-badge {
    background: rgba(255,107,107,0.12);
    border-color: rgba(255,107,107,0.3);
    color: #ff9f9f;
  }
  .logout-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    padding: 5px 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .logout-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

  main {
    max-width: 600px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  .welcome-section {
    text-align: center;
    margin-bottom: 2rem;
  }
  .welcome-photo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--accent);
    margin-bottom: 0.75rem;
  }
  .welcome-text { font-size: 22px; font-weight: 700; margin-bottom: 0.25rem; }
  .team-text { font-size: 14px; color: var(--muted); }

  .section-title {
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-left: 4px;
  }

  /* QR Cards */
  .qr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 1.5rem;
  }

  .qr-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    text-align: center;
    transition: border-color 0.2s, transform 0.15s;
  }
  .qr-card:hover { transform: translateY(-2px); }
  .qr-card.music { border-color: rgba(250,87,193,0.3); }
  .qr-card.submit { border-color: rgba(96,200,255,0.3); }

  .qr-icon { font-size: 28px; margin-bottom: 0.5rem; }
  .qr-title { font-size: 15px; font-weight: 600; margin-bottom: 0.75rem; }
  .qr-card.music .qr-title { color: var(--accent-music); }
  .qr-card.submit .qr-title { color: var(--accent-submit); }

  .qr-canvas {
    background: #fff;
    border-radius: 8px;
    padding: 8px;
    margin-bottom: 0.75rem;
    display: inline-block;
  }
  .qr-canvas canvas { display: block; }

  .qr-link {
    display: inline-block;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    padding: 6px 12px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }
  .qr-link:hover { 
    color: var(--text); 
    border-color: rgba(255,255,255,0.3);
  }

  /* Navigation Buttons */
  .nav-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .nav-btn {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 1rem;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  .nav-btn:hover {
    border-color: var(--accent);
    background: rgba(200,244,90,0.05);
    transform: translateY(-2px);
  }
  .nav-btn .icon { font-size: 32px; }
  .nav-btn .label { font-size: 15px; font-weight: 600; }
  .nav-btn .desc { font-size: 12px; color: var(--muted); }

  /* Admin Section */
  .admin-section {
    margin-top: 2rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid var(--border);
  }
  .admin-section .section-title { color: #ff9f9f; }
  .admin-info {
    background: rgba(255,107,107,0.08);
    border: 0.5px solid rgba(255,107,107,0.2);
    border-radius: var(--radius-sm);
    padding: 1rem;
    font-size: 13px;
    color: var(--muted);
  }
  .admin-info ul { margin-top: 0.5rem; padding-left: 1.25rem; }
  .admin-info li { margin: 0.25rem 0; }

  @media (max-width: 400px) {
    .qr-grid { grid-template-columns: 1fr; }
    .nav-buttons { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="event-title">🎉 FP26</div>
    <div class="user-badge" id="user-badge">
      <span id="user-name"></span>
    </div>
  </div>
  <button class="logout-btn" onclick="logout()">Logg ut</button>
</header>

<main>
  <section class="welcome-section">
    <img src="" alt="" class="welcome-photo" id="welcome-photo" onerror="this.style.display='none'">
    <div class="welcome-text">Velkommen, <span id="welcome-name"></span>!</div>
    <div class="team-text">Team: <span id="welcome-team"></span></div>
  </section>

  <section>
    <div class="section-title">Del med festen</div>
    <div class="qr-grid">
      <div class="qr-card music">
        <div class="qr-icon">🎵</div>
        <div class="qr-title">Legg til musikk</div>
        <div class="qr-canvas" id="music-qr"></div>
        <a href="music.html" class="qr-link">Åpne lenke →</a>
      </div>
      <div class="qr-card submit">
        <div class="qr-icon">📝</div>
        <div class="qr-title">Post noe</div>
        <div class="qr-canvas" id="submit-qr"></div>
        <a href="submit.html" class="qr-link">Åpne lenke →</a>
      </div>
    </div>
  </section>

  <section>
    <div class="section-title">Utforsk</div>
    <div class="nav-buttons">
      <a href="wall.html" class="nav-btn">
        <span class="icon">🎤</span>
        <span class="label">The Wall</span>
        <span class="desc">Se alle innlegg</span>
      </a>
      <a href="scores.html" class="nav-btn">
        <span class="icon">🏆</span>
        <span class="label">Scoreboard</span>
        <span class="desc">Følg lagene</span>
      </a>
    </div>
  </section>

  <section class="admin-section" id="admin-section" style="display: none;">
    <div class="section-title">🔒 Admin</div>
    <div class="admin-info">
      <strong>Du er logget inn som admin.</strong>
      <ul>
        <li>Gå til <a href="scores.html" style="color: var(--accent);">Scoreboard</a> for å legge til poeng</li>
        <li>Gå til <a href="wall.html" style="color: var(--accent);">The Wall</a> for å moderere innlegg</li>
      </ul>
    </div>
  </section>
</main>

<script>
// Configuration
const BASE_URL = window.location.origin + window.location.pathname.replace('home.html', '')
const MUSIC_URL = BASE_URL + 'music.html'
const SUBMIT_URL = BASE_URL + 'submit.html'

// Check session
const session = JSON.parse(localStorage.getItem('fp26_session') || 'null')
if (!session || !session.name) {
  window.location.href = 'index.html'
}

// Populate user info
document.getElementById('user-name').textContent = session.name
document.getElementById('welcome-name').textContent = session.name
document.getElementById('welcome-team').textContent = session.team

// Show user photo if available
if (session.photo) {
  document.getElementById('welcome-photo').src = session.photo
  document.getElementById('welcome-photo').alt = session.name
}

// Show admin badge and section if admin
if (session.isAdmin) {
  document.getElementById('user-badge').classList.add('admin-badge')
  document.getElementById('user-badge').innerHTML = '🔒 Admin'
  document.getElementById('admin-section').style.display = 'block'
  document.querySelector('.welcome-section').querySelector('.team-text').style.display = 'none'
}

// Generate QR codes
function generateQR(elementId, url) {
  const container = document.getElementById(elementId)
  const canvas = document.createElement('canvas')
  container.appendChild(canvas)
  
  QRCode.toCanvas(canvas, url, {
    width: 120,
    margin: 0,
    color: {
      dark: '#0e0e11',
      light: '#ffffff'
    }
  })
}

generateQR('music-qr', MUSIC_URL)
generateQR('submit-qr', SUBMIT_URL)

function logout() {
  localStorage.removeItem('fp26_session')
  window.location.href = 'index.html'
}
</script>

</body>
</html>
