<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP26 – Velg din karakter</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e11;
    --surface: #18181c;
    --border: rgba(255,255,255,0.10);
    --border-hover: rgba(200,244,90,0.5);
    --text: #f0eff4;
    --muted: rgba(240,239,244,0.45);
    --accent: #c8f45a;
    --accent-dark: #a8d038;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .event-emoji { font-size: 48px; margin-bottom: 0.75rem; }
  .event-name {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }
  .event-sub {
    font-size: 18px;
    color: var(--accent);
    font-weight: 500;
  }

  .character-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    max-width: 500px;
    width: 100%;
  }

  @media (max-width: 400px) {
    .character-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  .character-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .character-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(200,244,90,0.15);
  }
  .character-card:active {
    transform: translateY(-2px) scale(0.98);
  }

  .character-photo {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--border);
    transition: border-color 0.2s;
  }
  .character-card:hover .character-photo {
    border-color: var(--accent);
  }

  .character-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .character-team {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Admin indicator */
  .character-card.admin .character-photo {
    border-color: rgba(255,215,0,0.5);
  }
  .character-card.admin:hover .character-photo {
    border-color: gold;
  }
  .admin-badge {
    font-size: 10px;
    background: rgba(255,215,0,0.15);
    color: gold;
    padding: 2px 8px;
    border-radius: 99px;
    margin-top: -4px;
  }

  .footer {
    margin-top: 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="event-emoji">🎉</div>
  <div class="event-name">FP26</div>
  <div class="event-sub">Velg din karakter</div>
</div>

<div class="character-grid" id="character-grid">
  <!-- Characters will be inserted here -->
</div>

<div class="footer">
  Trykk på deg selv for å logge inn
</div>

<script>
// Supabase config
const SUPABASE_URL = 'https://zbjngimdvoazcshkvbgv.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpiam5naW1kdm9hemNzaGt2Ymd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTgyOTAsImV4cCI6MjA5NzY5NDI5MH0.1M3PZYGqKqqLIsTkaPSH1gEloVhTXFGV_yYJaQdJ8YY'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

// Define all participants
const PARTICIPANTS = [
  { id: 'tj',       name: 'TJ',       photo: 'tj.jpg',        team: 'Norge',     isAdmin: true },
  { id: 'eivind',   name: 'Eivind',   photo: 'eivind.jpeg',   team: 'Norge',     isAdmin: false },
  { id: 'helle',    name: 'Helle',    photo: 'helle.jpeg',    team: 'Frankrike', isAdmin: false },
  { id: 'kornelis', name: 'Kornelis', photo: 'kornelis.png',  team: 'Senegal',   isAdmin: false },
  { id: 'oyvind',   name: 'Øyvind',   photo: 'oyvind.png',    team: 'Irak',      isAdmin: false },
  { id: 'terje',    name: 'Terje',    photo: 'terje.png',     team: 'Norge',     isAdmin: false },
]

// Check if already logged in
const session = JSON.parse(localStorage.getItem('fp26_session') || 'null')
if (session && session.name) {
  window.location.href = 'home.html'
}

async function verifyAdminPin(pin) {
  try {
    const { data, error } = await sb
      .from('config')
      .select('value')
      .eq('key', 'admin_pin')
      .single()
    
    if (error) throw error
    return data.value === pin
  } catch (err) {
    console.error('Could not verify PIN:', err)
    return false
  }
}

async function selectCharacter(participant) {
  // If admin, verify PIN first
  if (participant.isAdmin) {
    const pin = prompt('Admin PIN:')
    if (!pin) return
    
    const isValid = await verifyAdminPin(pin)
    if (!isValid) {
      alert('Feil PIN')
      return
    }
  }
  
  // Store session
  const sessionData = {
    name: participant.name,
    team: participant.team,
    isAdmin: participant.isAdmin,
    photo: participant.photo,
    loginTime: Date.now()
  }
  localStorage.setItem('fp26_session', JSON.stringify(sessionData))
  
  // Redirect to home
  window.location.href = 'home.html'
}

// Render character grid
function renderCharacters() {
  const grid = document.getElementById('character-grid')
  
  grid.innerHTML = PARTICIPANTS.map(p => `
    <div class="character-card ${p.isAdmin ? 'admin' : ''}" onclick="selectCharacter(PARTICIPANTS.find(x => x.id === '${p.id}'))">
      <img src="${p.photo}" alt="${p.name}" class="character-photo" onerror="this.src='placeholder.png'">
      <div class="character-name">${p.name}</div>
      <div class="character-team">${p.team}</div>
      ${p.isAdmin ? '<div class="admin-badge">👑 Admin</div>' : ''}
    </div>
  `).join('')
}

renderCharacters()
</script>

</body>
</html>
