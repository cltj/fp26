<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frankrike vs Norge – Velg din karakter</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e11;
    --surface: #18181c;
    --border: rgba(255,255,255,0.10);
    --border-hover: rgba(200,244,90,0.5);
    --text: #f0eff4;
    --muted: rgba(240,239,244,0.45);
    --accent: #c8f45a;
    --accent-dark: #a8d038;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .header {
    text-align: center;
    margin-bottom: 2rem;
  }
  .event-emoji { font-size: 48px; margin-bottom: 0.75rem; }
  .event-name {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }
  .event-sub {
    font-size: 18px;
    color: var(--accent);
    font-weight: 500;
  }

  .character-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 600px;
    width: 100%;
  }

  @media (max-width: 500px) {
    .character-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  .character-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    flex-direction: column;
    padding: 16px 16px 12px;
    gap: 10px;
    align-items: center;
  }
  .character-card:hover {
    border-color: var(--border-hover);
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 12px 32px rgba(200,244,90,0.2);
  }
  .character-card:active {
    transform: translateY(-2px) scale(0.98);
  }

  .character-photo {
    width: 70%;
    aspect-ratio: 3/4;
    object-fit: cover;
    border-radius: var(--radius-sm);
    border: 2px solid var(--border);
    transition: border-color 0.2s;
  }
  .character-card:hover .character-photo {
    border-color: var(--accent);
  }

  .character-info {
    padding: 10px 12px;
    text-align: center;
  }

  .character-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
  }

  /* Admin indicator */
  .character-card.admin {
    border-color: rgba(255,215,0,0.3);
  }
  .character-card.admin:hover {
    border-color: gold;
    box-shadow: 0 12px 32px rgba(255,215,0,0.2);
  }
  .admin-badge {
    font-size: 10px;
    background: rgba(255,215,0,0.15);
    color: gold;
    padding: 2px 8px;
    border-radius: 99px;
    margin-top: 4px;
    display: inline-block;
  }

  .footer {
    margin-top: 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  .loading {
    grid-column: 1 / -1;
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="event-emoji">🎉</div>
  <div class="event-name">🇫🇷 Frankrike vs Norge 🇳🇴</div>
  <div class="event-sub">Velg din karakter</div>
</div>

<div class="character-grid" id="character-grid">
  <div class="loading">Laster deltakere...</div>
</div>

<div class="footer">
  Trykk på deg selv for å logge inn
</div>

<script>
// Supabase config
const SUPABASE_URL = 'https://zbjngimdvoazcshkvbgv.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpiam5naW1kdm9hemNzaGt2Ymd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTgyOTAsImV4cCI6MjA5NzY5NDI5MH0.1M3PZYGqKqqLIsTkaPSH1gEloVhTXFGV_yYJaQdJ8YY'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

let participants = []

// Check if already logged in
const session = JSON.parse(localStorage.getItem('fp26_session') || 'null')
if (session && session.name) {
  window.location.href = 'home.html'
}

async function loadParticipants() {
  try {
    const { data, error } = await sb
      .from('participants')
      .select('id, participant, photo_url, pin, isAdmin')
      .order('participant')
    
    if (error) throw error
    participants = data
    renderCharacters()
  } catch (err) {
    console.error('Could not load participants:', err)
    document.getElementById('character-grid').innerHTML = 
      '<div class="loading" style="color: #ff6b6b;">Kunne ikke laste deltakere</div>'
  }
}

async function selectCharacter(participantId) {
  const participant = participants.find(p => p.id === participantId)
  if (!participant) return
  
  // All participants must enter PIN
  const pin = prompt('PIN-kode:')
  if (!pin) return
  
  if (pin !== participant.pin.trim()) {
    alert('Feil PIN')
    return
  }
  
  // Store session
  const sessionData = {
    id: participant.id,
    name: participant.participant,
    isAdmin: participant.isAdmin || false,
    photo: participant.photo_url,
    loginTime: Date.now()
  }
  localStorage.setItem('fp26_session', JSON.stringify(sessionData))
  
  // Redirect to home
  window.location.href = 'home.html'
}

// Render character grid
function renderCharacters() {
  const grid = document.getElementById('character-grid')
  
  if (participants.length === 0) {
    grid.innerHTML = '<div class="loading">Ingen deltakere funnet</div>'
    return
  }
  
  grid.innerHTML = participants.map(p => `
    <div class="character-card ${p.isAdmin ? 'admin' : ''}" onclick="selectCharacter(${p.id})">
      <img src="${p.photo_url || 'placeholder.png'}" alt="${p.participant}" class="character-photo" onerror="this.src='placeholder.png'">
      <div class="character-info">
        <div class="character-name">${p.participant}</div>
        ${p.isAdmin ? '<div class="admin-badge">👑 Admin</div>' : ''}
      </div>
    </div>
  `).join('')
}

// Load participants on page load
loadParticipants()
</script>

</body>
</html>
