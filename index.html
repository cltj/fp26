<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FP26 – Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e11;
    --surface: #18181c;
    --border: rgba(255,255,255,0.10);
    --border-focus: rgba(255,255,255,0.30);
    --text: #f0eff4;
    --muted: rgba(240,239,244,0.45);
    --accent: #c8f45a;
    --accent-dark: #a8d038;
    --radius: 14px;
    --radius-sm: 8px;
    --danger: #ff6b6b;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .login-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }

  .event-emoji { font-size: 56px; margin-bottom: 1rem; }
  .event-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 0.5rem;
  }
  .event-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 2rem;
  }

  .form-group {
    margin-bottom: 1rem;
    text-align: left;
  }

  label {
    display: block;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus { border-color: var(--border-focus); }
  ::placeholder { color: var(--muted); }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: #0e0e11;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    padding: 14px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .login-btn:hover { background: var(--accent-dark); }
  .login-btn:active { transform: scale(0.98); }

  .error-msg {
    color: var(--danger);
    font-size: 13px;
    margin-top: 1rem;
    display: none;
  }
  .error-msg.show { display: block; }

  .admin-link {
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid var(--border);
  }
  .admin-link a {
    color: var(--muted);
    font-size: 13px;
    text-decoration: none;
    transition: color 0.15s;
  }
  .admin-link a:hover { color: var(--text); }
</style>
</head>
<body>

<div class="login-card">
  <div class="event-emoji">🎉</div>
  <div class="event-name">FP26</div>
  <div class="event-sub">Velkommen! Logg inn for å delta</div>

  <form id="login-form">
    <div class="form-group">
      <label>Navn</label>
      <input type="text" id="name-input" placeholder="Ditt navn" required autocomplete="off">
    </div>
    <div class="form-group">
      <label>Team</label>
      <input type="text" id="team-input" placeholder="Ditt lag" required autocomplete="off">
    </div>
    <button type="submit" class="login-btn">Logg inn</button>
    <div class="error-msg" id="error-msg">Vennligst fyll ut alle feltene</div>
  </form>

  <div class="admin-link">
    <a href="#" onclick="adminLogin(); return false;">🔒 Admin-innlogging</a>
  </div>
</div>

<script>
// Check if already logged in
const session = JSON.parse(localStorage.getItem('fp26_session') || 'null')
if (session && session.name) {
  window.location.href = 'home.html'
}

document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault()
  
  const name = document.getElementById('name-input').value.trim()
  const team = document.getElementById('team-input').value.trim()
  
  if (!name || !team) {
    document.getElementById('error-msg').classList.add('show')
    return
  }
  
  // Store session
  const sessionData = {
    name: name,
    team: team,
    isAdmin: false,
    loginTime: Date.now()
  }
  localStorage.setItem('fp26_session', JSON.stringify(sessionData))
  
  // Redirect to home
  window.location.href = 'home.html'
})

function adminLogin() {
  const pw = prompt('Admin-passord:')
  if (pw === '9900') {
    const sessionData = {
      name: 'Admin',
      team: 'Admin',
      isAdmin: true,
      loginTime: Date.now()
    }
    localStorage.setItem('fp26_session', JSON.stringify(sessionData))
    window.location.href = 'home.html'
  } else if (pw !== null) {
    alert('Feil passord')
  }
}

// Hide error on input
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('input', () => {
    document.getElementById('error-msg').classList.remove('show')
  })
})
</script>

</body>
</html>
