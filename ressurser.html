<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎴 Ressurser</title>
<link rel="stylesheet" href="story/story.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .access-denied {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
  }
  .access-denied .icon { font-size: 48px; margin-bottom: 1rem; }
  
  .resource-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .resource-card {
    background: rgba(30,30,30,0.8);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .resource-card:hover {
    border-color: rgba(200,244,90,0.3);
  }
  .resource-card.assigned {
    border-color: rgba(200,244,90,0.5);
    background: rgba(200,244,90,0.08);
  }
  .resource-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .resource-icon {
    font-size: 24px;
  }
  .resource-name {
    font-size: 16px;
    font-weight: 700;
    color: #c8f45a;
  }
  .resource-count {
    font-size: 12px;
    color: rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.1);
    padding: 2px 8px;
    border-radius: 10px;
  }
  .resource-owner {
    margin-left: auto;
    font-size: 12px;
    color: #c8f45a;
    background: rgba(200,244,90,0.15);
    padding: 4px 10px;
    border-radius: 10px;
  }
  .resource-effects {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .effect-row {
    display: flex;
    gap: 8px;
    font-size: 13px;
    line-height: 1.5;
  }
  .effect-label {
    flex-shrink: 0;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    min-width: 80px;
  }
  .effect-label.ballbinge { color: #60e060; }
  .effect-label.fc26 { color: #60c8ff; }
  .effect-label.general { color: #ffa060; }
  .effect-text {
    color: rgba(255,255,255,0.8);
  }
  
  .section-divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.1);
    margin: 1.5rem 0;
  }
  .section-title {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 1rem;
  }
  
  .loading {
    text-align: center;
    padding: 2rem;
    color: rgba(255,255,255,0.5);
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <a href="home.html" class="back-btn">← Hjem</a>
    <span class="chapter-title">🎴 Ressurser</span>
  </div>
</header>

<main id="main-content" style="display: none;">
  <div class="story-content">
    <h1>🎴 Ressurser</h1>
    <p style="color: rgba(255,255,255,0.6); margin-bottom: 1.5rem;">Kort som deles ut under quiz-delen av programmet.</p>
    
    <div class="section-title">🎒 Gjenstander</div>
    <div class="resource-list" id="item-cards">
      <div class="loading">Laster kort...</div>
    </div>
    
    <hr class="section-divider">
    <div class="section-title">⚙️ Modifikatorer</div>
    <div class="resource-list" id="modifier-cards">
      <div class="loading">Laster kort...</div>
    </div>
    
    <hr class="section-divider">
    <div class="section-title">📋 Regler</div>
    <div class="resource-list" id="rule-cards">
      <div class="loading">Laster kort...</div>
    </div>
    
    <hr class="section-divider">
    <div class="section-title">⭐ Spesialkort</div>
    <div class="resource-list" id="special-cards">
      <div class="loading">Laster kort...</div>
    </div>
  </div>
</main>

<div class="access-denied" id="access-denied" style="display: none;">
  <div class="icon">🎴</div>
  <h2>Ressurser ikke tilgjengelig</h2>
  <p style="color: rgba(255,255,255,0.5); margin-top: 0.5rem;">Vent til admin aktiverer ressurssiden.</p>
  <a href="home.html" style="color: #c8f45a; margin-top: 1rem;">← Tilbake</a>
</div>

<script>
const SUPABASE_URL = 'https://zbjngimdvoazcshkvbgv.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpiam5naW1kdm9hemNzaGt2Ymd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTgyOTAsImV4cCI6MjA5NzY5NDI5MH0.1M3PZYGqKqqLIsTkaPSH1gEloVhTXFGV_yYJaQdJ8YY'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const stored = localStorage.getItem('fp26_session')
let isAdmin = false

if (stored) {
  const session = JSON.parse(stored)
  isAdmin = session.isAdmin === true || session.name === 'Tj'
}

// Check if activity is active for non-admin users
async function checkAccess() {
  if (isAdmin) {
    document.getElementById('main-content').style.display = 'block'
    init()
    return
  }
  
  // For non-admin, check if ressurser activity is active
  const { data: activity, error } = await sb
    .from('activities')
    .select('is_active')
    .eq('id', 'ressurser')
    .single()
  
  if (!error && activity && activity.is_active) {
    document.getElementById('main-content').style.display = 'block'
    init()
  } else {
    document.getElementById('access-denied').style.display = 'flex'
  }
}
checkAccess()

let teams = {}
let activities = {}

async function init() {
  // Load teams for displaying ownership
  const { data: teamsData } = await sb.from('teams').select('id, team_name, flag')
  if (teamsData) {
    teamsData.forEach(t => teams[t.id] = t)
  }
  
  // Load activity states
  const { data: activitiesData } = await sb.from('activities').select('id, is_active')
  if (activitiesData) {
    activitiesData.forEach(a => activities[a.id] = a.is_active)
  }
  
  // Load and render resources
  await loadResources()
}

async function loadResources() {
  const { data: resources, error } = await sb
    .from('resources')
    .select('*')
    .order('id')
  
  if (error) {
    console.error('Error loading resources:', error)
    document.getElementById('item-cards').innerHTML = '<p>Kunne ikke laste kort</p>'
    document.getElementById('modifier-cards').innerHTML = ''
    document.getElementById('rule-cards').innerHTML = ''
    document.getElementById('special-cards').innerHTML = ''
    return
  }
  
  const itemCards = resources.filter(r => r.category === 'item')
  const modifierCards = resources.filter(r => r.category === 'modifier')
  const ruleCards = resources.filter(r => r.category === 'rule')
  const specialCards = resources.filter(r => r.category === 'special')
  
  document.getElementById('item-cards').innerHTML = itemCards.map(renderCard).join('') || '<p style="color: rgba(255,255,255,0.4);">Ingen kort</p>'
  document.getElementById('modifier-cards').innerHTML = modifierCards.map(renderCard).join('') || '<p style="color: rgba(255,255,255,0.4);">Ingen kort</p>'
  document.getElementById('rule-cards').innerHTML = ruleCards.map(renderCard).join('') || '<p style="color: rgba(255,255,255,0.4);">Ingen kort</p>'
  document.getElementById('special-cards').innerHTML = specialCards.map(renderCard).join('') || '<p style="color: rgba(255,255,255,0.4);">Ingen kort</p>'
}

function renderCard(card) {
  const owner = card.team_id ? teams[card.team_id] : null
  const ownerHtml = owner ? `<span class="resource-owner">${owner.flag} ${owner.team_name}</span>` : ''
  
  let effectsHtml = ''
  
  // Show Ballbinge (ex1) only if ballbinge activity is active
  if (card.ex1 && activities['ballbinge']) {
    effectsHtml += `
      <div class="effect-row">
        <span class="effect-label ballbinge">Ballbinge:</span>
        <span class="effect-text">${card.ex1}</span>
      </div>
    `
  }
  
  // Show FC26 (ex2) only if fc26 activity is active
  if (card.ex2 && activities['fc26']) {
    effectsHtml += `
      <div class="effect-row">
        <span class="effect-label fc26">FC26:</span>
        <span class="effect-text">${card.ex2}</span>
      </div>
    `
  }
  
  // Always show general effect
  if (card.effect) {
    effectsHtml += `
      <div class="effect-row">
        <span class="effect-label general">Effekt:</span>
        <span class="effect-text">${card.effect}</span>
      </div>
    `
  }
  
  // Always show notes
  if (card.notes) {
    effectsHtml += `
      <div class="effect-row">
        <span class="effect-label general">Generelt:</span>
        <span class="effect-text">${card.notes}</span>
      </div>
    `
  }
  
  // If no effects visible yet (activities not started), show placeholder
  if (!effectsHtml) {
    effectsHtml = `
      <div class="effect-row">
        <span class="effect-text" style="color: rgba(255,255,255,0.4); font-style: italic;">Effekter vises når øvelser aktiveres</span>
      </div>
    `
  }
  
  return `
    <div class="resource-card ${owner ? 'assigned' : ''}">
      <div class="resource-header">
        <span class="resource-icon">${card.icon || '🎴'}</span>
        <span class="resource-name">${card.title}</span>
        ${card.type !== 'base' ? `<span class="resource-count">x${card.qty}</span>` : ''}
        ${ownerHtml}
      </div>
      <div class="resource-effects">
        ${effectsHtml}
      </div>
    </div>
  `
}
</script>

</body>
</html>
