<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foppalfæst!! – Hjem</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e11;
    --surface: #18181c;
    --surface2: #1e1e24;
    --border: rgba(255,255,255,0.10);
    --text: #f0eff4;
    --muted: rgba(240,239,244,0.45);
    --accent: #c8f45a;
    --accent-dark: #a8d038;
    --accent-music: #fa57c1;
    --accent-submit: #60c8ff;
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    padding-bottom: 2rem;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(14,14,17,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
    padding: 0.85rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .event-title { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
  .user-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(200,244,90,0.12);
    border: 0.5px solid rgba(200,244,90,0.3);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
  }
  .admin-badge {
    background: rgba(255,107,107,0.12);
    border-color: rgba(255,107,107,0.3);
    color: #ff9f9f;
  }
  .logout-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-size: 12px;
    font-family: inherit;
    padding: 5px 12px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .logout-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

  /* Mini Scoreboard - Group Stage Style */
  .mini-scoreboard {
    margin-bottom: 1.5rem;
  }
  .mini-sb-table {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    width: 100%;
  }
  .mini-sb-header {
    background: #1a5f2a;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: grid;
    grid-template-columns: 24px 28px 1fr 1fr 32px;
    gap: 8px;
    align-items: center;
  }
  .mini-sb-header span { color: var(--muted); }
  .mini-sb-row {
    display: grid;
    grid-template-columns: 24px 28px 1fr 1fr 32px;
    gap: 8px;
    align-items: center;
    padding: 8px 12px;
    border-bottom: 0.5px solid var(--border);
    min-height: 52px;
    box-sizing: border-box;
  }
  .mini-sb-row:last-child { border-bottom: none; }
  .mini-sb-row.qualified { background: rgba(34,197,94,0.12); }
  .mini-sb-row.playoff { background: rgba(234,179,8,0.12); }
  .mini-sb-row.eliminated { background: rgba(239,68,68,0.08); }
  .mini-sb-pos {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-align: center;
  }
  .mini-sb-flag { font-size: 18px; text-align: center; }
  .mini-sb-name { font-size: 13px; font-weight: 500; }
  .mini-sb-participants {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    align-items: center;
  }
  .mini-sb-participant {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--muted);
  }
  .mini-sb-member {
    width: 28px;
    height: 36px;
    border-radius: 4px;
    object-fit: cover;
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .mini-sb-member:hover {
    transform: scale(1.1);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .mini-sb-placeholder {
    width: 28px;
    height: 36px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1.5px dashed var(--border);
  }
  .mini-sb-pts {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    text-align: right;
  }

  /* Photo Overlay */
  .photo-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
    padding: 2rem;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .photo-overlay.active { display: flex; }
  .photo-overlay-img {
    max-width: 85vw;
    max-height: 70vh;
    border-radius: 12px;
    object-fit: contain;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    border: 3px solid var(--accent);
  }
  .photo-overlay-name {
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--text);
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .photo-overlay-close {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    font-size: 2rem;
    color: var(--text);
    background: rgba(255,255,255,0.1);
    border: none;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    transition: background 0.2s;
  }
  .photo-overlay-close:hover { background: rgba(255,255,255,0.2); }

  /* Football Pitch - 4-4-2 Formation */
  .pitch-section {
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 0.5px solid var(--border);
  }
  .pitch-container {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    max-width: 380px;
    margin: 0 auto;
    background: 
      repeating-linear-gradient(
        180deg,
        #1e6b35 0px,
        #1e6b35 40px,
        #237a3d 40px,
        #237a3d 80px
      );
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  /* Pitch markings */
  .pitch-markings {
    position: absolute;
    inset: 8px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 4px;
    pointer-events: none;
  }
  .pitch-center-line {
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 2px;
    background: rgba(255,255,255,0.6);
  }
  .pitch-center-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 80px;
    height: 80px;
    border: 2px solid rgba(255,255,255,0.6);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .pitch-center-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 8px;
    height: 8px;
    background: rgba(255,255,255,0.6);
    border-radius: 50%;
    transform: translate(-50%, -50%);
  }
  .pitch-box {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 55%;
    height: 15%;
    border: 2px solid rgba(255,255,255,0.6);
  }
  .pitch-box.top { top: 8px; border-top: none; }
  .pitch-box.bottom { bottom: 8px; border-bottom: none; }
  .pitch-goal-box {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 25%;
    height: 6%;
    border: 2px solid rgba(255,255,255,0.6);
  }
  .pitch-goal-box.top { top: 8px; border-top: none; }
  .pitch-goal-box.bottom { bottom: 8px; border-bottom: none; }
  .pitch-formation {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 8% 6%;
    z-index: 2;
  }
  .pitch-row {
    display: flex;
    justify-content: space-around;
    align-items: center;
  }
  .pitch-row.gk { justify-content: center; }
  .pitch-row.fwd { padding: 0 8%; }
  .pitch-row.mid { padding: 0 12%; }
  .pitch-player {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .pitch-player-photo {
    width: 48px;
    height: 64px;
    border-radius: 6px;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.9);
    box-shadow: 0 3px 12px rgba(0,0,0,0.5);
    background: var(--surface2);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .pitch-player-photo:hover {
    transform: scale(1.15);
    box-shadow: 0 6px 20px rgba(0,0,0,0.6);
  }
  .pitch-player-photo.placeholder {
    border-style: dashed;
    border-color: rgba(255,255,255,0.35);
    opacity: 0.6;
    cursor: default;
  }
  .pitch-player-photo.placeholder:hover {
    transform: none;
    box-shadow: 0 3px 12px rgba(0,0,0,0.5);
  }
  .pitch-player-name {
    font-size: 10px;
    font-weight: 600;
    color: white;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
    max-width: 65px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pitch-player-name.placeholder {
    opacity: 0.35;
  }

  main {
    max-width: 600px;
    margin: 0 auto;
    padding: 1.5rem 1rem;
  }

  .welcome-section {
    text-align: center;
    margin-bottom: 2rem;
  }
  .welcome-photo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 0.75rem;
  }
  .welcome-photo {
    width: 80px;
    height: 107px;
    border-radius: 10px;
    object-fit: cover;
    border: 3px solid var(--accent);
  }
  .team-badge {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 0.25rem;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .team-badge.visible { display: flex; }
  .team-flag { font-size: 32px; }
  .team-name { font-size: 12px; color: var(--muted); }
  .welcome-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 0.75rem;
  }
  .tv2-promo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  .tv2-qr {
    width: 70px;
    height: 70px;
    border-radius: 8px;
  }
  .tv2-link {
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    padding: 4px 10px;
    border: 0.5px solid rgba(200,244,90,0.3);
    border-radius: var(--radius-sm);
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tv2-link:hover {
    background: rgba(200,244,90,0.1);
  }
  .welcome-text { font-size: 22px; font-weight: 700; margin-bottom: 0.25rem; }

  .section-title {
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    padding-left: 4px;
  }

  /* Action Cards */
  .action-grid {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .action-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    transition: border-color 0.2s, transform 0.15s;
  }
  .action-card:hover { transform: translateY(-2px); }
  .action-card.music { border-color: rgba(250,87,193,0.3); }
  .action-card.submit { border-color: rgba(96,200,255,0.3); }

  .action-qr {
    width: 60px;
    height: 60px;
    border-radius: var(--radius-sm);
    flex-shrink: 0;
  }

  .action-content {
    flex: 1;
    min-width: 0;
  }

  .action-title {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .action-card.music .action-title { color: var(--accent-music); }
  .action-card.submit .action-title { color: var(--accent-submit); }

  .action-desc {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .action-btn {
    display: inline-block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    text-decoration: none;
    padding: 6px 12px;
    border-radius: var(--radius-sm);
    transition: all 0.15s;
  }
  .action-card.music .action-btn {
    background: rgba(250,87,193,0.15);
    border: 0.5px solid rgba(250,87,193,0.3);
  }
  .action-card.music .action-btn:hover {
    background: rgba(250,87,193,0.25);
  }
  .action-card.submit .action-btn {
    background: rgba(96,200,255,0.15);
    border: 0.5px solid rgba(96,200,255,0.3);
  }
  .action-card.submit .action-btn:hover {
    background: rgba(96,200,255,0.25);
  }
  .action-card.wall { border-color: rgba(251,191,36,0.3); }
  .action-card.wall .action-title { color: #fbbf24; }
  .action-card.wall .action-btn {
    background: rgba(251,191,36,0.15);
    border: 0.5px solid rgba(251,191,36,0.3);
  }
  .action-card.wall .action-btn:hover {
    background: rgba(251,191,36,0.25);
  }
  .action-card.orakel { 
    border-color: rgba(168,85,247,0.4); 
    background: rgba(168,85,247,0.1);
  }
  .action-card.orakel .action-title { color: #a855f7; }
  .action-card.orakel .action-btn {
    background: rgba(168,85,247,0.2);
    border: 0.5px solid rgba(168,85,247,0.4);
  }
  .action-card.orakel .action-btn:hover {
    background: rgba(168,85,247,0.3);
  }

  main { padding: 1rem 1.5rem; }
  .section-title { 
    font-size: 15px; 
    font-weight: 600; 
    margin-bottom: 0.75rem; 
    color: var(--text);
  }

  /* Welcome Section */
  .welcome-section {
    text-align: center;
    padding: 1rem 0 1.5rem;
  }
  .welcome-photo {
    width: 100px;
    height: 130px;
    border-radius: 12px;
    object-fit: cover;
    border: 2px solid var(--accent);
    margin-bottom: 0.75rem;
  }
  .welcome-name {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .welcome-greeting {
    font-size: 14px;
    color: var(--muted);
  }
  .team-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(200,244,90,0.12);
    border: 0.5px solid rgba(200,244,90,0.3);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    margin-top: 8px;
  }
  .team-flag { font-size: 16px; }

  /* Quick Links Row */
  .quick-links {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .quick-link {
    flex: 1;
    min-width: 80px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    font-size: 12px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .quick-link:hover {
    background: var(--surface2);
    border-color: rgba(255,255,255,0.2);
  }
  .quick-link.music { border-color: rgba(250,87,193,0.3); color: var(--accent-music); }
  .quick-link.submit { border-color: rgba(96,200,255,0.3); color: var(--accent-submit); }
  .quick-link.wall { border-color: rgba(251,191,36,0.3); color: #fbbf24; }
  .quick-link.ressurser { border-color: rgba(200,150,100,0.3); color: #daa520; }

  /* Activity Buttons */
  .activity-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 1.5rem;
  }
  .activity-btn {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
    text-decoration: none;
    color: var(--text);
    transition: all 0.15s;
  }
  .activity-btn:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.2);
  }
  .activity-icon { font-size: 24px; margin-bottom: 4px; }
  .activity-name { font-size: 13px; font-weight: 600; }
  .activity-btn.quiz { border-color: rgba(150,100,200,0.3); background: linear-gradient(135deg, rgba(150,100,200,0.1), rgba(200,244,90,0.05)); }
  .activity-btn.fotball { border-color: rgba(100,255,150,0.3); background: linear-gradient(135deg, rgba(100,255,150,0.1), rgba(200,244,90,0.05)); }
  .activity-btn.fc26 { border-color: rgba(100,200,255,0.3); background: linear-gradient(135deg, rgba(100,200,255,0.1), rgba(200,244,90,0.05)); }
  .activity-btn.orakel { border-color: rgba(168,85,247,0.3); background: linear-gradient(135deg, rgba(168,85,247,0.1), rgba(200,244,90,0.05)); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="event-title">⚽ Foppalfæst!!</div>
    <div class="user-badge" id="user-badge">
      <span id="user-name"></span>
    </div>
  </div>
  <div style="display: flex; gap: 8px;">
    <a href="admin.html" class="logout-btn" id="admin-link" style="display: none; text-decoration: none;">👑 Admin</a>
    <button class="logout-btn" onclick="logout()">Logg ut</button>
  </div>
</header>

<main>
  <!-- 1. Welcome Section: Photo + Name + Greeting -->
  <section class="welcome-section">
    <img src="" alt="" class="welcome-photo" id="welcome-photo" style="display:none;">
    <div class="welcome-name" id="welcome-name"></div>
    <div class="welcome-greeting">Velkommen til Foppalfæst!!</div>
    <div class="team-badge" id="team-badge" style="display: none;">
      <span class="team-flag" id="team-flag"></span>
      <span id="team-name-display"></span>
    </div>
  </section>

  <!-- 2. Quick Links: Resources + Music + Submit + Wall -->
  <section>
    <div class="quick-links">
      <a href="ressurser.html?view=all" class="quick-link ressurser">🎴 Ressurser</a>
      <a href="https://music.apple.com/no/playlist/pl.u-AkAm8ENsx3y8dzL?a=join&it=Y2Be7k4fWZPv7JBhqp8GG&l=nb" target="_blank" class="quick-link music">🎵 Musikk</a>
      <a href="submit.html" class="quick-link submit">📝 Meld</a>
      <a href="wall.html" class="quick-link wall">📣 Wall</a>
    </div>
  </section>

  <!-- 3. Standings Table (hidden until points exist) -->
  <section id="standings-section" style="display: none;">
    <div class="section-title">🏆 Totale poeng</div>
    <div class="mini-scoreboard" id="mini-scoreboard">
      <!-- Loaded by JS -->
    </div>
  </section>

  <!-- 4. Activities (show only activated ones, in order) -->
  <section id="activities-section" style="display: none;">
    <div class="section-title">🎯 Aktiviteter</div>
    <div class="activity-grid">
      <a href="quiz_score.html" class="activity-btn quiz" id="activity-quiz" style="display: none;">
        <div class="activity-icon">🧠</div>
        <div class="activity-name">Quiz</div>
      </a>
      <a href="fotball.html" class="activity-btn fotball" id="activity-fotball" style="display: none;">
        <div class="activity-icon">⚽</div>
        <div class="activity-name">Fotball</div>
      </a>
      <a href="fc26.html" class="activity-btn fc26" id="activity-fc26" style="display: none;">
        <div class="activity-icon">🎮</div>
        <div class="activity-name">FC26</div>
      </a>
      <a href="orakel.html" class="activity-btn orakel" id="activity-orakel" style="display: none;">
        <div class="activity-icon">🔮</div>
        <div class="activity-name">Orakelet</div>
      </a>
    </div>
  </section>

  <!-- 5. Troppen (as is) -->
  <section class="pitch-section">
    <div class="section-title">⚽ Troppen</div>
    <div class="pitch-container">
      <div class="pitch-markings"></div>
      <div class="pitch-center-line"></div>
      <div class="pitch-center-circle"></div>
      <div class="pitch-center-dot"></div>
      <div class="pitch-box top"></div>
      <div class="pitch-box bottom"></div>
      <div class="pitch-goal-box top"></div>
      <div class="pitch-goal-box bottom"></div>
      <div class="pitch-formation" id="pitch-formation">
        <!-- Loaded by JS -->
      </div>
    </div>
  </section>
</main>

<script>

// Mini Scoreboard
// FASIT for orakel points calculation
const ORAKEL_FASIT = {
  away_goals: 4,  // Frankrike
  home_goals: 1,  // Norge
  first_goal: 'away',
  yellow_cards: 'likt'
}

// FC26 placement points
const FC26_PLACEMENT_POINTS = { 1: 9, 2: 7, 3: 4, 4: 1 }

function calculateOrakelPoints(prediction) {
  let points = 0
  // Eksakt resultat: 5 poeng
  if (prediction.away_goals === ORAKEL_FASIT.away_goals && 
      prediction.home_goals === ORAKEL_FASIT.home_goals) {
    points += 5
  } else {
    // Riktig vinner: 2 poeng
    const predWinner = prediction.away_goals > prediction.home_goals ? 'away' : 
                      prediction.away_goals < prediction.home_goals ? 'home' : 'draw'
    if (predWinner === 'away') points += 2
  }
  // Scorer først: 1 poeng
  if (prediction.first_goal === ORAKEL_FASIT.first_goal) points += 1
  // Gule kort: 1 poeng
  if (prediction.yellow_cards === ORAKEL_FASIT.yellow_cards) points += 1
  return points
}

function calculateFC26Standings(matches) {
  // Build standings directly from matches (using home_team_id, away_team_id)
  const standings = {}
  
  matches.forEach(match => {
    if (!match.home_team_id || !match.away_team_id) return
    
    // Initialize teams if not yet done
    if (!standings[match.home_team_id]) {
      standings[match.home_team_id] = { team_id: match.home_team_id, points: 0, gf: 0, ga: 0 }
    }
    if (!standings[match.away_team_id]) {
      standings[match.away_team_id] = { team_id: match.away_team_id, points: 0, gf: 0, ga: 0 }
    }
    
    if (match.home_score === null || match.away_score === null) return
    
    const home = standings[match.home_team_id]
    const away = standings[match.away_team_id]
    home.gf += match.home_score
    home.ga += match.away_score
    away.gf += match.away_score
    away.ga += match.home_score
    
    if (match.home_score > match.away_score) {
      home.points += 3
    } else if (match.home_score < match.away_score) {
      away.points += 3
    } else {
      home.points += 1
      away.points += 1
    }
  })
  
  // Sort by points, then goal difference
  const sorted = Object.values(standings).sort((a, b) => {
    if (b.points !== a.points) return b.points - a.points
    return (b.gf - b.ga) - (a.gf - a.ga)
  })
  
  // Return team_id -> placement points
  const result = {}
  sorted.forEach((s, idx) => {
    if (s.team_id) result[s.team_id] = FC26_PLACEMENT_POINTS[idx + 1] || 0
  })
  return result
}

async function loadMiniScoreboard() {
  // Load only active teams (group teams)
  const { data: teamsData } = await sb.from('teams').select('id, team_name, flag').eq('is_active', true).order('id')
  if (!teamsData || teamsData.length === 0) {
    return
  }
  
  // Calculate scores from source tables
  const scoreMap = {}
  teamsData.forEach(t => scoreMap[t.id] = { fotball: 0, orakel: 0, fc26: 0 })
  
  // 1. Fotball points from activity_fotball
  const { data: fotballData } = await sb.from('activity_fotball').select('team_id, points')
  if (fotballData) {
    fotballData.forEach(row => {
      if (scoreMap[row.team_id]) {
        scoreMap[row.team_id].fotball += row.points || 0
      }
    })
  }
  
  // 2. Orakel points from activity_predictions
  const { data: predictionsData } = await sb.from('activity_predictions').select('team_id, home_goals, away_goals, first_goal, yellow_cards')
  if (predictionsData) {
    predictionsData.forEach(p => {
      if (scoreMap[p.team_id]) {
        scoreMap[p.team_id].orakel += calculateOrakelPoints(p)
      }
    })
  }
  
  // 3. FC26 points from activity_fc26 standings
  const { data: fc26Data } = await sb.from('activity_fc26').select('match_num, home_team_id, away_team_id, home_score, away_score')
  if (fc26Data && fc26Data.length > 0) {
    const fc26Points = calculateFC26Standings(fc26Data)
    Object.keys(fc26Points).forEach(teamId => {
      const id = parseInt(teamId)
      if (scoreMap[id]) {
        scoreMap[id].fc26 = fc26Points[id]
      }
    })
  }
  
  // Calculate totals
  let hasAnyPoints = false
  Object.keys(scoreMap).forEach(teamId => {
    const s = scoreMap[teamId]
    s.total = s.fotball + s.orakel + s.fc26
    if (s.total > 0) hasAnyPoints = true
  })
  
  // Only show standings if at least one team has points
  if (!hasAnyPoints) {
    return
  }
  
  // Load participants with team assignments
  const { data: participantsData } = await sb.from('participants').select('id, participant, photo_url, team_id')
  
  // Group participants by team
  const teamMembers = {}
  if (participantsData) {
    participantsData.forEach(p => {
      if (p.team_id) {
        if (!teamMembers[p.team_id]) teamMembers[p.team_id] = []
        teamMembers[p.team_id].push(p)
      }
    })
  }
  
  // Merge and sort
  const ranked = teamsData.map(t => ({
    id: t.id,
    flag: t.flag || '🏳️',
    name: t.team_name,
    pts: scoreMap[t.id]?.total || 0,
    members: teamMembers[t.id] || []
  })).sort((a, b) => b.pts - a.pts)
  
  // Determine position classes
  const getRowClass = (i) => {
    if (i < 2) return 'qualified'
    if (i === 2) return 'playoff'
    return 'eliminated'
  }
  
  // Render members with names
  const renderMembers = (members) => {
    if (members.length === 0) {
      return '<span class="mini-sb-participant"><span class="mini-sb-placeholder"></span></span>'
    }
    return members.map(m => `
      <span class="mini-sb-participant">
        <span>${m.participant.split(' ')[0]}</span>
        <img src="${m.photo_url || 'placeholder.png'}" alt="${m.participant}" class="mini-sb-member" onclick="showPhotoOverlay('${m.photo_url || ''}', '${m.participant}')" onerror="this.src='placeholder.png'">
      </span>
    `).join('')
  }
  
  // Show standings section
  document.getElementById('standings-section').style.display = 'block'
  
  // Render
  document.getElementById('mini-scoreboard').innerHTML = `
    <div class="mini-sb-table">
      <div class="mini-sb-header">
        <span>#</span>
        <span></span>
        <span>Lag</span>
        <span>Deltakere</span>
        <span>Pts</span>
      </div>
      ${ranked.map((t, i) => `
        <div class="mini-sb-row ${getRowClass(i)}">
          <span class="mini-sb-pos">${i + 1}</span>
          <span class="mini-sb-flag">${t.flag}</span>
          <span class="mini-sb-name">${t.name}</span>
          <span class="mini-sb-participants">${renderMembers(t.members)}</span>
          <span class="mini-sb-pts">${t.pts}</span>
        </div>
      `).join('')}
    </div>
  `
}
loadMiniScoreboard()

// Photo overlay
function showPhotoOverlay(url, name) {
  if (!url) return
  const overlay = document.getElementById('photo-overlay')
  document.getElementById('overlay-img').src = url
  document.getElementById('overlay-name').textContent = name
  overlay.classList.add('active')
}

function closePhotoOverlay() {
  document.getElementById('photo-overlay').classList.remove('active')
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closePhotoOverlay()
})

// Load pitch formation
async function loadPitchFormation() {
  const { data: participants } = await sb
    .from('participants')
    .select('id, participant, photo_url')
    .order('id')
  
  // 4-3-3 formation: 4 DEF, 3 MID, 3 FWD = 10 players
  const formation = [
    { row: 'fwd', count: 3 },
    { row: 'mid', count: 3 },
    { row: 'def', count: 4 }
  ]
  
  let playerIndex = 0
  const players = participants || []
  
  const renderPlayer = (p) => {
    if (p) {
      return `
        <div class="pitch-player">
          <img src="${p.photo_url || 'placeholder.png'}" 
               class="pitch-player-photo" 
               onclick="showPhotoOverlay('${p.photo_url || ''}', '${p.participant}')"
               onerror="this.src='placeholder.png'">
          <span class="pitch-player-name">${p.participant.split(' ')[0]}</span>
        </div>
      `
    } else {
      return `
        <div class="pitch-player">
          <div class="pitch-player-photo placeholder"></div>
          <span class="pitch-player-name placeholder">?</span>
        </div>
      `
    }
  }
  
  const html = formation.map(({ row, count }) => {
    const rowPlayers = []
    for (let i = 0; i < count; i++) {
      rowPlayers.push(renderPlayer(players[playerIndex]))
      playerIndex++
    }
    return `<div class="pitch-row ${row}">${rowPlayers.join('')}</div>`
  }).join('')
  
  document.getElementById('pitch-formation').innerHTML = html
}
loadPitchFormation()

// Check active activities for participants
async function checkActiveActivities() {
  const { data: activities, error } = await sb
    .from('activities')
    .select('activity_name, is_active')
    .eq('is_active', true)
    .order('display_order')
  
  if (error) {
    console.log('Could not check activities:', error)
    return
  }
  
  let anyActive = false
  activities?.forEach(activity => {
    const activityEl = document.getElementById(`activity-${activity.activity_name}`)
    if (activityEl) {
      activityEl.style.display = 'block'
      anyActive = true
    }
  })
  
  // Show section only if at least one activity is active
  if (anyActive) {
    document.getElementById('activities-section').style.display = 'block'
  }
}
checkActiveActivities()
