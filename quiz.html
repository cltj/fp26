<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Foppalfæst!!</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e11;
    --surface: #18181c;
    --border: rgba(255,255,255,0.10);
    --text: #f0eff4;
    --muted: rgba(240,239,244,0.45);
    --accent: #c8f45a;
    --radius: 16px;
    --radius-sm: 10px;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }
  
  header {
    padding: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 0.5px solid var(--border);
  }
  .back-btn {
    background: transparent;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--muted);
    font-size: 13px;
    padding: 8px 12px;
    text-decoration: none;
  }
  .progress {
    font-size: 14px;
    color: var(--muted);
  }
  .progress strong { color: var(--accent); }
  
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    text-align: center;
  }
  
  .question-num {
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 1rem;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  
  .question-text {
    font-size: 28px;
    font-weight: 600;
    max-width: 700px;
    line-height: 1.4;
    margin-bottom: 2rem;
  }
  
  .answer-reveal {
    background: rgba(200,244,90,0.1);
    border: 1px solid rgba(200,244,90,0.3);
    border-radius: var(--radius);
    padding: 1.5rem 3rem;
    margin-bottom: 2rem;
    opacity: 0;
    visibility: hidden;
    transform: scale(0.9);
    transition: opacity 0.3s, transform 0.3s;
  }
  .answer-reveal.visible {
    opacity: 1;
    visibility: visible;
    transform: scale(1);
  }
  .answer-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 0.5rem;
  }
  .answer-value {
    font-size: 48px;
    font-weight: 700;
    color: var(--accent);
  }
  
  .teams-section {
    display: none;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 1rem;
  }
  .teams-section.visible { display: flex; }
  
  .team-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 16px;
    font-weight: 600;
    padding: 1rem 2rem;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 150px;
  }
  .team-btn:hover {
    border-color: var(--accent);
    background: rgba(200,244,90,0.1);
  }
  .team-btn.winner {
    background: rgba(200,244,90,0.2);
    border-color: var(--accent);
    color: var(--accent);
  }
  
  .controls {
    padding: 1.5rem;
    border-top: 0.5px solid var(--border);
    display: flex;
    gap: 12px;
    justify-content: center;
  }
  .ctrl-btn {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .ctrl-btn:hover { border-color: var(--accent); }
  .ctrl-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .ctrl-btn.primary {
    background: rgba(200,244,90,0.15);
    border-color: rgba(200,244,90,0.4);
    color: var(--accent);
  }
  
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 2rem;
    padding: 1rem;
    margin-bottom: 1rem;
  }
  .score-item {
    text-align: center;
  }
  .score-team {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .score-points {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }
  
  .complete-screen {
    display: none;
  }
  .complete-screen.visible {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .complete-icon { font-size: 64px; margin-bottom: 1rem; }
  .complete-title { font-size: 32px; font-weight: 700; margin-bottom: 2rem; }
  .final-scores {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem 2rem;
    min-width: 250px;
  }
  .final-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    font-size: 18px;
    border-bottom: 0.5px solid var(--border);
  }
  .final-row:last-child { border-bottom: none; }
  .final-row:first-child { font-weight: 700; color: var(--accent); }
  
  .access-denied {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .access-denied .icon { font-size: 48px; margin-bottom: 1rem; }
  
  .start-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    position: fixed;
    inset: 0;
    padding: 3rem;
    background: url('trophy.jpeg') center center no-repeat;
    background-size: cover;
  }
  .start-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(14,14,17,0.7);
    z-index: 0;
  }
  .start-screen > * {
    position: relative;
    z-index: 1;
  }
  .start-screen h1 {
    font-size: 48px;
    margin: 0;
    text-shadow: 0 2px 20px rgba(0,0,0,0.8);
  }
  .start-screen p {
    color: var(--muted);
    font-size: 18px;
  }
  .start-btn {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    padding: 1.25rem 3rem;
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(200,244,90,0.4);
  }
</style>
</head>
<body>

<div id="quiz-app">
  <header>
    <a href="home.html" class="back-btn">← Hjem</a>
    <div class="progress" id="progress" style="display: none;">Spørsmål <strong id="current-num">1</strong> / <strong>10</strong></div>
    <span></span>
  </header>

  <main>
    <div class="start-screen" id="start-screen">
      <h1>🧠</h1>
      <button class="start-btn" id="start-btn">Start analyse</button>
    </div>
    
    <div class="scoreboard" id="scoreboard" style="display: none;"></div>
    
    <div id="question-view" style="display: none;">
      <div class="question-num" id="q-category">Kategori 1</div>
      <div class="question-text" id="q-text">Laster...</div>
      
      <div class="answer-reveal" id="answer-box">
        <div class="answer-label">Fasit</div>
        <div class="answer-value" id="answer-value">-</div>
      </div>
      
      <div class="teams-section" id="teams-section">
        <p style="width: 100%; color: var(--muted); font-size: 14px; margin-bottom: 0.5rem;">Hvem var nærmest?</p>
        <!-- Team buttons added by JS -->
        <button class="team-btn clear-btn" id="clear-winner-btn" style="background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.3); color: #f87171; display: none;">✕ Nullstill</button>
      </div>
    </div>
    
    <div class="complete-screen" id="complete-screen">
      <div class="complete-icon">🏆</div>
      <div class="final-scores" id="final-scores"></div>
    </div>
  </main>

  <div class="controls" id="controls" style="display: none;">
    <button class="ctrl-btn" id="prev-btn" disabled>← Forrige</button>
    <button class="ctrl-btn primary" id="reveal-btn">Vis fasit</button>
    <button class="ctrl-btn" id="next-btn">Neste →</button>
  </div>
</div>

<div class="access-denied" id="access-denied" style="display: none;">
  <div class="icon">🔒</div>
  <h2>Kun for admin</h2>
  <p style="color: var(--muted); margin-top: 0.5rem;">Quizen styres av admin.</p>
  <a href="home.html" style="color: var(--accent); margin-top: 1rem;">← Tilbake</a>
</div>

<script>
const SUPABASE_URL = 'https://zbjngimdvoazcshkvbgv.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpiam5naW1kdm9hemNzaGt2Ymd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMTgyOTAsImV4cCI6MjA5NzY5NDI5MH0.1M3PZYGqKqqLIsTkaPSH1gEloVhTXFGV_yYJaQdJ8YY'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

const session = JSON.parse(localStorage.getItem('fp26_session') || 'null')

if (!session || !session.isAdmin) {
  document.getElementById('quiz-app').style.display = 'none'
  document.getElementById('access-denied').style.display = 'flex'
}

let questions = []
let teams = []
let currentIndex = 0
let scores = {}

async function init() {
  // Load teams
  const { data: teamsData } = await sb.from('teams').select('*').order('id')
  teams = teamsData || []
  
  // Load questions
  const { data: questionsData } = await sb.from('activity_quiz').select('*').order('id')
  questions = questionsData || []
  
  // Init scores
  teams.forEach(t => scores[t.id] = 0)
  
  // Count existing wins
  questions.forEach(q => {
    if (q.winner_team_id) {
      scores[q.winner_team_id] = (scores[q.winner_team_id] || 0) + 1
    }
  })
  
  renderTeamButtons()
  renderScoreboard()
  
  // Setup start button
  document.getElementById('start-btn').onclick = startQuiz
}

function startQuiz() {
  document.getElementById('start-screen').style.display = 'none'
  document.getElementById('progress').style.display = 'block'
  document.getElementById('scoreboard').style.display = 'flex'
  document.getElementById('question-view').style.display = 'block'
  document.getElementById('controls').style.display = 'flex'
  showQuestion(0)
}

function renderTeamButtons() {
  const container = document.getElementById('teams-section')
  const existingBtns = container.querySelectorAll('.team-btn')
  existingBtns.forEach(b => b.remove())
  
  teams.forEach(team => {
    const btn = document.createElement('button')
    btn.className = 'team-btn'
    btn.textContent = team.team_name
    btn.dataset.teamId = team.id
    btn.onclick = () => selectWinner(team.id)
    container.appendChild(btn)
  })
}

function renderScoreboard() {
  const sb = document.getElementById('scoreboard')
  const sorted = teams
    .map(t => ({ name: t.team_name, score: scores[t.id] || 0 }))
    .sort((a, b) => b.score - a.score)
  
  sb.innerHTML = sorted.map(t => `
    <div class="score-item">
      <div class="score-team">${t.name}</div>
      <div class="score-points">${t.score}</div>
    </div>
  `).join('')
}

function showQuestion(index) {
  if (index < 0 || index >= questions.length) return
  
  currentIndex = index
  const q = questions[index]
  
  // Hide answer FIRST before updating content
  document.getElementById('answer-box').classList.remove('visible')
  document.getElementById('teams-section').classList.remove('visible')
  
  // Small delay to ensure answer is hidden before updating
  setTimeout(() => {
    document.getElementById('current-num').textContent = index + 1
    document.getElementById('q-category').textContent = `Spørsmål ${index + 1}`
    document.getElementById('q-text').textContent = q.question
    document.getElementById('answer-value').textContent = formatNumber(q.answer)
    
    document.getElementById('reveal-btn').disabled = false
    document.getElementById('reveal-btn').textContent = 'Vis fasit'
    
    // Update team buttons
    document.querySelectorAll('.team-btn:not(.clear-btn)').forEach(btn => {
      btn.classList.remove('winner')
      if (q.winner_team_id && btn.dataset.teamId == q.winner_team_id) {
        btn.classList.add('winner')
      }
    })
    
    // Show/hide clear button
    document.getElementById('clear-winner-btn').style.display = q.winner_team_id ? 'block' : 'none'
    
    // Nav buttons
    document.getElementById('prev-btn').disabled = index === 0
    document.getElementById('next-btn').textContent = index === questions.length - 1 ? 'Fullfør' : 'Neste →'
    
    // Show question view, hide complete
    document.getElementById('question-view').style.display = 'block'
    document.getElementById('complete-screen').classList.remove('visible')
  }, 50)
}

function revealAnswer() {
  document.getElementById('answer-box').classList.add('visible')
  document.getElementById('teams-section').classList.add('visible')
  document.getElementById('reveal-btn').disabled = true
  document.getElementById('reveal-btn').textContent = 'Velg vinner ↓'
}

async function selectWinner(teamId) {
  const q = questions[currentIndex]
  const oldWinner = q.winner_team_id
  
  // Update locally
  if (oldWinner) scores[oldWinner]--
  scores[teamId]++
  q.winner_team_id = teamId
  
  // Update UI
  document.querySelectorAll('.team-btn:not(.clear-btn)').forEach(btn => {
    btn.classList.toggle('winner', btn.dataset.teamId == teamId)
  })
  document.getElementById('clear-winner-btn').style.display = 'block'
  renderScoreboard()
  
  // Save to DB
  await sb.from('activity_quiz').update({ winner_team_id: teamId }).eq('id', q.id)
}

async function clearWinner() {
  const q = questions[currentIndex]
  const oldWinner = q.winner_team_id
  
  if (!oldWinner) return
  
  // Update locally
  scores[oldWinner]--
  q.winner_team_id = null
  
  // Update UI
  document.querySelectorAll('.team-btn').forEach(btn => btn.classList.remove('winner'))
  document.getElementById('clear-winner-btn').style.display = 'none'
  renderScoreboard()
  
  // Save to DB - use null properly
  await sb.from('activity_quiz').update({ winner_team_id: null }).eq('id', q.id)
}

function nextQuestion() {
  if (currentIndex === questions.length - 1) {
    showComplete()
  } else {
    showQuestion(currentIndex + 1)
  }
}

function showComplete() {
  document.getElementById('question-view').style.display = 'none'
  document.getElementById('controls').style.display = 'none'
  document.getElementById('scoreboard').style.display = 'none'
  document.getElementById('complete-screen').classList.add('visible')
  
  const sorted = teams
    .map(t => ({ name: t.team_name, score: scores[t.id] || 0 }))
    .sort((a, b) => b.score - a.score)
  
  document.getElementById('final-scores').innerHTML = sorted.map(t => `
    <div class="final-row">
      <span>${t.name}</span>
      <span>${t.score}</span>
    </div>
  `).join('')
}

function formatNumber(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1) + ' millioner'
  if (num >= 1000) return num.toLocaleString('nb-NO')
  return num.toString()
}

// Event listeners
document.getElementById('reveal-btn').onclick = revealAnswer
document.getElementById('next-btn').onclick = nextQuestion
document.getElementById('prev-btn').onclick = () => showQuestion(currentIndex - 1)
document.getElementById('clear-winner-btn').onclick = clearWinner

init()
</script>
</body>
</html>
